<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSC Engine Portal</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #0f172a;
      color: #f8fafc;
    }
    h3 {
      margin-top: 0;
      color: #38bdf8;
      font-size: 16px;
      border-bottom: 1px solid #334155;
      padding-bottom: 8px;
    }
    button {
      width: 100%;
      background-color: #0ea5e9;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #0284c7;
    }
    button:disabled {
      background-color: #64748b;
      cursor: not-allowed;
    }
    #output {
      margin-top: 12px;
      padding: 10px;
      background-color: #1e293b;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      border: 1px solid #334155;
    }
    .status-wait { color: #eab308; }
    .status-error { color: #f43f5e; }
    .status-success { color: #10b981; }
  </style>
</head>
<body>
  <h3>Neural Sieve Cascade</h3>
  <p style="font-size: 12px; color: #94a3b8; margin-bottom: 16px;">
    Analyze the current live article for factual accuracy using edge DOM scraping.
  </p>
  <button id="analyze-btn">Scan Active Article</button>
  <div id="output">Click scan to begin analysis framework...</div>

  <script src="popup.js"></script>
</body>
</html>
